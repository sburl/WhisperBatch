name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  pr-checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          if [[ "${{ matrix.python-version }}" == "3.12" ]]; then
            sed 's/^numpy==1\.24\.3$/numpy==1.26.4/' requirements.txt > requirements-ci.txt
            pip install -r requirements-ci.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run unit tests
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m unittest discover -s tests
          else
            echo "No unit tests detected; skipping."
          fi

  nightly-checks:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          if [[ "${{ matrix.python-version }}" == "3.12" ]]; then
            sed 's/^numpy==1\.24\.3$/numpy==1.26.4/' requirements.txt > requirements-ci.txt
            pip install -r requirements-ci.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run unit tests
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m unittest discover -s tests
          else
            echo "No unit tests detected; skipping."
          fi

      - name: Run formatting check
        run: |
          python -m pip install ruff
          ruff check .

      - name: Run dependency audit
        run: |
          python -m pip install pip-audit bandit
          pip-audit
          bandit -r whisper_batch_core
