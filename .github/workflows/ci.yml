name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      run_nightly:
        description: Run nightly job set on manual trigger
        required: false
        default: "false"

jobs:
  pr-checks:
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_nightly != 'true')
    name: PR Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-dev.txt

      - name: Run lint check
        run: ruff check transcribe_audio.py transcribe_gui.py whisper_batch_core tests scripts

      - name: Run unit tests
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest -q
          else
            echo "No unit tests detected; skipping."
          fi

      - name: Verify importability
        run: |
          python -m py_compile transcribe_audio.py
          python -m py_compile transcribe_gui.py
          python -m py_compile whisper_batch_core/*.py
          python scripts/ci_secret_scan.py

  nightly-checks:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_nightly == 'true')
    name: Nightly Regression Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest -q
          else
            echo "No unit tests detected; skipping."
          fi

      - name: Run format check
        run: ruff format --check transcribe_audio.py transcribe_gui.py whisper_batch_core tests scripts

      - name: Run dependency vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Run static security scan
        run: bandit -r transcribe_audio.py whisper_batch_core

      - name: Verify importability
        run: |
          python -m py_compile transcribe_audio.py
          python -m py_compile transcribe_gui.py
          python -m py_compile whisper_batch_core/*.py
          python scripts/ci_secret_scan.py

      - name: Run CLI smoke command
        run: python transcribe_audio.py --help
